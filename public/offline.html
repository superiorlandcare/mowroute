<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <title>Offline · MowRoute</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #f5f5f4;
        color: #1c1917;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 22rem; width: 100%; }
      .badge {
        width: 64px; height: 64px; border-radius: 18px;
        background: #16a34a; color: #fff; margin: 0 auto 20px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 30px; letter-spacing: -1px;
      }
      h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: -0.5px; margin: 0 0 8px; }
      p { color: #78716c; font-size: 0.9rem; line-height: 1.5; margin: 0 0 20px; }
      button {
        width: 100%; padding: 14px; border: 0; border-radius: 16px;
        background: #16a34a; color: #fff; font-weight: 700; font-size: 0.9rem;
        text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
      }
      button:active { transform: scale(0.99); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">M</div>
      <h1>You're offline</h1>
      <p>
        MowRoute needs a connection to load the route. You'll often have low
        signal out on the route — reconnect and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
